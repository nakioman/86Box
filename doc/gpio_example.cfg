# Example 86Box configuration for Raspberry Pi GPIO HDD LEDs
# Add these lines to your 86box.cfg file under the [Unix] section

[Unix]
# Enable GPIO support for hardware LEDs
gpio_enabled = 1

# GPIO pin 18 (Physical pin 12) for HDD activity LED (any read/write)
# This LED will light up during both read and write operations
gpio_hdd_activity_pin = 18

# GPIO pin 24 (Physical pin 18) for HDD write LED (write operations only)  
# This LED will only light up during write operations
gpio_hdd_write_pin = 24

# Alternative single-LED setup (uncomment to use):
# Use the same pin for both if you only want one LED
# gpio_hdd_activity_pin = 18
# gpio_hdd_write_pin = 18

# To disable a specific LED, set its pin to -1:
# gpio_hdd_activity_pin = -1    # Disables HDD activity LED
# gpio_hdd_write_pin = -1       # Disables HDD write LED

# Hardware Setup Required:
# - Connect LED anode (long leg) to GPIO pin
# - Connect LED cathode (short leg) through 330Ω resistor to GND
# - For GPIO 18: Use Raspberry Pi physical pin 12
# - For GPIO 24: Use Raspberry Pi physical pin 18  
# - GND connections available on pins: 6, 9, 14, 20, 25, 30, 34, 39
